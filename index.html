<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Reminders</title>
<meta name="description" content="Family reminder and deadline tracker">
<meta name="theme-color" content="#C2410C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reminders">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFEF9;
    --ink: #1C1917;
    --ink-light: #57534E;
    --ink-faint: #A8A29E;
    --accent: #C2410C;
    --accent-light: #FEF3EC;
    --accent-mid: #EA580C;
    --green: #15803D;
    --green-light: #F0FDF4;
    --border: #E7E2DA;
    --shadow: 0 1px 3px rgba(28,25,23,0.08);
    --shadow-lg: 0 4px 24px rgba(28,25,23,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 15px; }

  header { background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink); }
  .logo span { color: var(--accent); font-style: italic; }
  .sync-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--cream); border: 1px solid var(--border); color: var(--ink-faint); }
  .sync-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .sync-badge.live { background: var(--green-light); border-color: #BBF7D0; color: var(--green); }
  .sync-badge.live .dot { background: var(--green); }
  .sync-badge.error { background: #FEF2F2; border-color: #FECACA; color: #DC2626; }
  .sync-badge.error .dot { background: #DC2626; }

  .container { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
  .tabs { display: flex; gap: 4px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 28px; width: fit-content; }
  .tab { padding: 7px 20px; border-radius: 7px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--ink-light); transition: all 0.15s; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: var(--cream); }
  .section { display: none; }
  .section.active { display: block; }

  .card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; margin-bottom: 20px; color: var(--ink); }

  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-light); margin-bottom: 6px; letter-spacing: 0.2px; }
  input[type=text], input[type=email], input[type=date], input[type=password], textarea, select { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(194,65,12,0.08); background: var(--warm-white); }
  textarea { resize: vertical; min-height: 72px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:520px) { .form-row-2 { grid-template-columns: 1fr; } }

  .alert-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .alert-chip { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--cream); color: var(--ink-light); transition: all 0.15s; user-select: none; }
  .alert-chip input { display: none; }
  .alert-chip.checked { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .alert-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .alert-chip.checked .dot { background: var(--accent); }

  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-mid); transform: translateY(-1px); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--ink-light); }
  .btn-ghost:hover { background: var(--cream); }
  .btn-danger { background: transparent; border: 1px solid #FECACA; color: #DC2626; padding: 6px 12px; font-size: 13px; }
  .btn-danger:hover { background: #FEF2F2; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ── Collapsible reminder cards ── */
  .reminder-item { background: var(--warm-white); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; transition: box-shadow 0.15s; }
  .reminder-item:hover { box-shadow: var(--shadow-lg); }
  .reminder-summary { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .reminder-date-badge { background: var(--accent-light); color: var(--accent); border-radius: 8px; padding: 6px 10px; text-align: center; min-width: 46px; flex-shrink: 0; }
  .reminder-date-badge .day { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; line-height: 1; }
  .reminder-date-badge .month { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }
  .reminder-summary-body { flex: 1; min-width: 0; }
  .reminder-title { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .reminder-summary-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .reminder-chevron { color: var(--ink-faint); font-size: 13px; flex-shrink: 0; transition: transform 0.2s; }
  .reminder-item.open .reminder-chevron { transform: rotate(180deg); }
  .reminder-details { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .reminder-item.open .reminder-details { display: block; }
  .reminder-desc { font-size: 13px; color: var(--ink-light); margin: 12px 0 10px; line-height: 1.5; }
  .reminder-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .reminder-actions { display: flex; gap: 8px; }

  .member-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--warm-white); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
  .member-info { flex: 1; }
  .member-name { font-weight: 500; font-size: 15px; }
  .member-email { font-size: 13px; color: var(--ink-light); }

  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 16px; }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 14px; font-weight: 500; }
  .settings-sub { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .settings-input-sm { width: 240px !important; }
  @media(max-width:520px) { .settings-input-sm { width: 100% !important; } .settings-row { flex-direction: column; align-items: flex-start; } }

  .toggle-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--cream); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; user-select: none; transition: border-color 0.15s, background 0.15s; }
  .toggle-row:hover { border-color: var(--ink-faint); }
  .toggle-row.active { background: #FEF9C3; border-color: #FDE047; }
  .toggle-switch { width: 36px; height: 20px; background: var(--border); border-radius: 10px; position: relative; flex-shrink: 0; transition: background 0.2s; }
  .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .toggle-row.active .toggle-switch { background: #CA8A04; }
  .toggle-row.active .toggle-switch::after { transform: translateX(16px); }
  .toggle-label { font-size: 14px; font-weight: 500; color: var(--ink-light); flex: 1; }
  .toggle-row.active .toggle-label { color: #854D0E; }
  .toggle-sub { font-size: 12px; color: var(--ink-faint); margin-top: 1px; }
  .toggle-row.active .toggle-sub { color: #A16207; }

  .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-chip { background: var(--warm-white); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; flex: 1; min-width: 100px; }
  .stat-num { font-family: 'Lora', serif; font-size: 24px; font-weight: 600; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--ink-faint); margin-top: 3px; }

  .api-status { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 5px 12px; border-radius: 20px; background: var(--cream); border: 1px solid var(--border); color: var(--ink-light); margin-top: 10px; }
  .api-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); }
  .api-status.configured .dot { background: var(--green); }
  .api-status.configured { color: var(--green); background: var(--green-light); border-color: #BBF7D0; }

  .recipient-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .recipient-chip { display: flex; align-items: center; gap: 6px; padding: 6px 13px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--cream); color: var(--ink-light); transition: all 0.15s; user-select: none; }
  .recipient-chip input { display: none; }
  .recipient-chip.checked { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 500; }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-faint); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty h3 { font-family: 'Lora', serif; font-size: 18px; color: var(--ink-light); margin-bottom: 6px; }
  .empty p { font-size: 14px; }

  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 24px; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; box-shadow: var(--shadow-lg); }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: #15803D; }
  #toast.error { background: #DC2626; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(28,25,23,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--warm-white); border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Setup wizard */
  .setup-screen { max-width: 560px; margin: 60px auto; }
  .setup-step { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .setup-step:last-child { border-bottom: none; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .step-content { flex: 1; }
  .step-title { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  .step-desc { font-size: 13px; color: var(--ink-light); line-height: 1.6; }
  .step-desc code { background: var(--cream); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: monospace; font-size: 12px; color: var(--accent); }
  .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 12px; color: var(--ink-faint); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">family <span>reminders</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div style="font-size:13px;color:var(--ink-faint)" id="today-date"></div>
    <div class="sync-badge" id="sync-badge"><span class="dot"></span> <span id="sync-label">Connecting…</span></div>
  </div>
</header>

<div class="container" id="main-container">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div style="font-size:14px">Loading…</div>
  </div>
</div>

<!-- Modal: Edit reminder -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Edit reminder</div>
    <div class="form-row"><label>Title</label><input type="text" id="edit-title"></div>
    <div class="form-row"><label>Description</label><textarea id="edit-desc"></textarea></div>
    <div class="form-row"><label>Due date</label><input type="date" id="edit-date"></div>
    <div class="form-row">
      <label>Time to send email (IST)</label>
      <select id="edit-notify-time">
        <option value="06:00">6:00 AM</option>
        <option value="07:00">7:00 AM</option>
        <option value="08:00">8:00 AM</option>
        <option value="09:00">9:00 AM</option>
        <option value="10:00">10:00 AM</option>
        <option value="12:00">12:00 PM (noon)</option>
        <option value="15:00">3:00 PM</option>
        <option value="18:00">6:00 PM</option>
        <option value="20:00">8:00 PM</option>
      </select>
    </div>
    <div class="form-row">
      <label>Notify</label>
      <div class="recipient-options" id="edit-recipient-options"></div>
    </div>
    <div class="form-row">
      <label>After reminder is sent</label>
      <div class="toggle-row" id="edit-autodel-toggle" onclick="toggleAutodel(this)">
        <div class="toggle-switch"></div>
        <div><div class="toggle-label">Delete automatically</div><div class="toggle-sub">Good for one-time events.</div></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="edit-save-btn" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG — fill these in ─────────────────────────────────
// You can also set them in Settings tab after first load
const SUPABASE_URL    = localStorage.getItem('sb_url')    || '';
const SUPABASE_ANON   = localStorage.getItem('sb_anon')   || '';
const MAILJET_API     = localStorage.getItem('mj_api')    || '';
const MAILJET_SECRET  = localStorage.getItem('mj_secret') || '';
const FROM_EMAIL      = localStorage.getItem('mj_from')   || '';
const FROM_NAME       = localStorage.getItem('mj_name')   || 'Family Reminders';
// ────────────────────────────────────────────────────────────

let sb = null;
let reminders = [];
let members   = [];
let editId    = null;
let channel   = null;

document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'long', year:'numeric'});

async function init() {
  const url  = 'https://vbeztitzdnzfwmlfiatt.supabase.co';
  const anon = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiZXp0aXR6ZG56ZndtbGZpYXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzkyMDEsImV4cCI6MjA5MTIxNTIwMX0.E9WOu9ctreqcfJBSpnHkjtssWWmOvE__7skbpSDN2WY';

  localStorage.setItem('sb_url',  url);
  localStorage.setItem('sb_anon', anon);

  try {
    sb = supabase.createClient(url, anon);
    await loadData();
    renderApp();
    subscribeRealtime();
    setSyncStatus('live');
    checkAndSendDueReminders();
  } catch(e) {
    setSyncStatus('error');
    document.getElementById('main-container').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:#57534E">
        <div style="font-size:18px;font-weight:500;margin-bottom:8px">Could not connect to database</div>
        <div style="font-size:14px">Please check your internet connection and try refreshing.</div>
      </div>`;
  }
}

// ─── Setup screen ─────────────────────────────────────────
function renderSetup(isError = false) {
  setSyncStatus('error');
  document.getElementById('main-container').innerHTML = `
    <div class="setup-screen">
      <div class="card">
        <div class="card-title">Connect to Supabase</div>
        ${isError ? `<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;color:#DC2626">Could not connect — check your URL and key below.</div>` : ''}
        <p style="font-size:14px;color:var(--ink-light);line-height:1.7;margin-bottom:20px">
          Supabase stores your reminders and family members in the cloud so everyone sees the same data on any device.
        </p>

        <div class="form-row">
          <label>Supabase project URL</label>
          <input type="text" id="setup-url" placeholder="https://xxxxxxxxxxxx.supabase.co" value="${localStorage.getItem('sb_url')||''}">
        </div>
        <div class="form-row">
          <label>Supabase anon (public) key</label>
          <input type="text" id="setup-anon" placeholder="eyJhbGci…" value="${localStorage.getItem('sb_anon')||''}">
        </div>

        <button class="btn btn-primary" onclick="saveSupabaseConfig()" style="margin-bottom:24px">Connect & continue</button>

        <div style="border-top:1px solid var(--border);padding-top:20px">
          <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:14px">How to find these — 3 steps in Supabase:</div>
          <div class="setup-step">
            <div class="step-num">1</div>
            <div class="step-content">
              <div class="step-title">Open your Supabase project</div>
              <div class="step-desc">Go to <a href="https://supabase.com/dashboard" target="_blank" style="color:var(--accent)">supabase.com/dashboard</a> → click your project</div>
            </div>
          </div>
          <div class="setup-step">
            <div class="step-num">2</div>
            <div class="step-content">
              <div class="step-title">Get your URL and anon key</div>
              <div class="step-desc">Go to <strong>Settings → API</strong>. Copy the <strong>Project URL</strong> and the <strong>anon public</strong> key from the "Project API keys" section.</div>
            </div>
          </div>
          <div class="setup-step">
            <div class="step-num">3</div>
            <div class="step-content">
              <div class="step-title">Create the two tables</div>
              <div class="step-desc">Go to <strong>SQL Editor</strong> in Supabase and run this once:</div>
              <div style="margin-top:10px;background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:var(--ink-light);line-height:1.8;white-space:pre-wrap">create table members (
  id uuid default gen_random_uuid() primary key,
  name text not null,
  email text not null,
  created_at timestamptz default now()
);

create table reminders (
  id uuid default gen_random_uuid() primary key,
  title text not null,
  description text,
  due_date date not null,
  category text default 'other',
  alerts integer[] default '{}',
  recipients text default 'everyone',
  auto_delete boolean default false,
  sent_alerts text[] default '{}',
  created_at timestamptz default now()
);

alter table members enable row level security;
alter table reminders enable row level security;
create policy "allow all" on members for all using (true) with check (true);
create policy "allow all" on reminders for all using (true) with check (true);</div>
              <button class="btn btn-ghost" onclick="copySQL()" style="margin-top:8px;font-size:12px;padding:6px 12px">Copy SQL</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function copySQL() {
  const sql = `create table members (
  id uuid default gen_random_uuid() primary key,
  name text not null,
  email text not null,
  created_at timestamptz default now()
);

create table reminders (
  id uuid default gen_random_uuid() primary key,
  title text not null,
  description text,
  due_date date not null,
  category text default 'other',
  alerts integer[] default '{}',
  recipients text default 'everyone',
  auto_delete boolean default false,
  sent_alerts text[] default '{}',
  created_at timestamptz default now()
);

alter table members enable row level security;
alter table reminders enable row level security;
create policy "allow all" on members for all using (true) with check (true);
create policy "allow all" on reminders for all using (true) with check (true);`;
  navigator.clipboard.writeText(sql).then(() => showToast('SQL copied!', 'success'));
}

async function saveSupabaseConfig() {
  const url  = document.getElementById('setup-url').value.trim();
  const anon = document.getElementById('setup-anon').value.trim();
  if (!url || !anon) return showToast('Please enter both URL and key', 'error');
  localStorage.setItem('sb_url',  url);
  localStorage.setItem('sb_anon', anon);
  document.getElementById('main-container').innerHTML = `<div class="loading-screen"><div class="spinner"></div><div style="font-size:14px">Connecting…</div></div>`;
  await init();
}

// ─── Data loading ──────────────────────────────────────────
async function loadData() {
  const [{ data: r, error: re }, { data: m, error: me }] = await Promise.all([
    sb.from('reminders').select('*').order('due_date'),
    sb.from('members').select('*').order('created_at')
  ]);
  if (re) throw re;
  if (me) throw me;
  reminders = r || [];
  members   = m || [];
}

// ─── Realtime subscription ─────────────────────────────────
function subscribeRealtime() {
  if (channel) sb.removeChannel(channel);
  channel = sb.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reminders' }, async () => {
      const { data } = await sb.from('reminders').select('*').order('due_date');
      reminders = data || [];
      renderReminders();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, async () => {
      const { data } = await sb.from('members').select('*').order('created_at');
      members = data || [];
      renderMembers();
      buildRecipientChips();
    })
    .subscribe(status => {
      setSyncStatus(status === 'SUBSCRIBED' ? 'live' : 'error');
    });
}

function setSyncStatus(state) {
  const badge = document.getElementById('sync-badge');
  const label = document.getElementById('sync-label');
  if (!badge) return;
  badge.className = 'sync-badge' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
  label.textContent = state === 'live' ? 'Live sync' : state === 'error' ? 'Offline' : 'Connecting…';
}

// ─── Tab switching ─────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['reminders','add','members','settings'][i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'add') buildRecipientChips();
}

// ─── Render reminders ──────────────────────────────────────
function renderReminders() {
  const list = document.getElementById('reminders-list');
  const statsEl = document.getElementById('stats-bar');
  if (!list) return;

  const now = new Date(); now.setHours(0,0,0,0);
  const upcoming = reminders.filter(r => new Date(r.due_date) >= now).length;
  const overdue  = reminders.filter(r => new Date(r.due_date) < now).length;
  const thisWeek = reminders.filter(r => {
    const d = new Date(r.due_date); d.setHours(0,0,0,0);
    const diff = Math.round((d - now) / 86400000);
    return diff >= 0 && diff <= 7;
  }).length;

  if (statsEl) statsEl.innerHTML = reminders.length ? `
    <div class="stat-chip"><div class="stat-num">${reminders.length}</div><div class="stat-label">Total</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:var(--green)">${upcoming}</div><div class="stat-label">Upcoming</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:#F59E0B">${thisWeek}</div><div class="stat-label">This week</div></div>
    <div class="stat-chip"><div class="stat-num" style="color:#DC2626">${overdue}</div><div class="stat-label">Overdue</div></div>` : '';

  if (!reminders.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><h3>No reminders yet</h3><p>Add your first family reminder above</p></div>`;
    return;
  }

  list.innerHTML = [...reminders].sort((a,b) => new Date(a.due_date) - new Date(b.due_date)).map(r => {
    const d = new Date(r.due_date); d.setHours(0,0,0,0);
    const diff = Math.round((d - now) / 86400000);
    const day  = d.getDate();
    const mon  = d.toLocaleString('en-IN', {month:'short'}).toUpperCase();

    let statusTag = '';
    if (diff < 0)        statusTag = `<span class="tag tag-overdue">${Math.abs(diff)}d overdue</span>`;
    else if (diff === 0) statusTag = `<span class="tag tag-today">Today!</span>`;
    else if (diff <= 3)  statusTag = `<span class="tag tag-soon">${diff}d left</span>`;

    const categoryLabel = {
      bill: 'Bill / Payment', fd: 'FD Renewal', vehicle_insurance: 'Vehicle Insurance',
      health_insurance: 'Health Insurance', health: 'Health / Medical',
      government: 'Government / Official', other: 'Other'
    }[r.category] || r.category;

    const recLabel = r.recipients === 'everyone' ? 'Everyone' :
      (() => {
        try {
          const ids = JSON.parse(r.recipients);
          return ids.map(id => { const m = members.find(x => x.id === id); return m ? m.name : ''; }).filter(Boolean).join(', ');
        } catch { return r.recipients; }
      })();

    const alertTags = (r.alerts||[]).map(a =>
      `<span class="tag tag-alert">${a==0?'Day-of':a+'d before'}</span>`).join('');

    // Compact status indicator
    let statusBadge = '';
    if (diff < 0)        statusBadge = `<span class="tag tag-overdue">${Math.abs(diff)}d overdue</span>`;
    else if (diff === 0) statusBadge = `<span class="tag tag-today">Today!</span>`;
    else if (diff <= 3)  statusBadge = `<span class="tag tag-soon">${diff}d left</span>`;
    else                 statusBadge = `<span style="font-size:12px;color:var(--ink-faint)">${diff} days away</span>`;

    return `<div class="reminder-item" id="ri-${r.id}">
      <div class="reminder-summary" onclick="toggleCard('${r.id}')">
        <div class="reminder-date-badge"><div class="day">${day}</div><div class="month">${mon}</div></div>
        <div class="reminder-summary-body">
          <div class="reminder-title">${esc(r.title)}</div>
          <div class="reminder-summary-meta">
            ${statusBadge}
            <span style="font-size:12px;color:var(--ink-faint)">${esc(categoryLabel)}</span>
            ${r.notify_time ? `<span style="font-size:12px;color:var(--ink-faint)">${r.notify_time} IST</span>` : ''}
          </div>
        </div>
        <div class="reminder-chevron">▼</div>
      </div>
      <div class="reminder-details">
        ${r.description ? `<div class="reminder-desc">${esc(r.description)}</div>` : ''}
        <div class="reminder-tags">
          ${alertTags}
          ${recLabel ? `<span class="tag tag-member">${esc(recLabel)}</span>` : ''}
          ${r.notify_time ? `<span class="tag" style="background:#EDE9FE;color:#5B21B6">${r.notify_time} IST</span>` : ''}
          ${r.auto_delete ? `<span class="tag tag-autodel">auto-delete after</span>` : ''}
        </div>
        <div class="reminder-actions">
          <button class="btn btn-ghost" style="padding:6px 14px;font-size:13px" onclick="openEdit('${r.id}')">Edit</button>
          <button class="btn btn-danger" onclick="deleteReminder('${r.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── Add reminder ──────────────────────────────────────────
async function addReminder() {
  const title = document.getElementById('r-title').value.trim();
  const date  = document.getElementById('r-date').value;
  if (!title) return showToast('Please enter a title', 'error');
  if (!date)  return showToast('Please pick a due date', 'error');

  const alerts = [...document.querySelectorAll('#alert-options .alert-chip.checked input')]
    .map(i => parseInt(i.value));

  const catSelect = document.getElementById('r-category').value;
  const category  = catSelect === 'custom'
    ? (document.getElementById('r-custom-category').value.trim() || 'Other')
    : catSelect;

  const notifyTime = document.getElementById('r-notify-time').value;

  const evChip = document.querySelector('#recipient-options-add #chip-everyone');
  let recipients;
  if (evChip && evChip.classList.contains('checked')) {
    recipients = 'everyone';
  } else {
    const ids = [...document.querySelectorAll('#recipient-options-add .recipient-chip.checked:not(#chip-everyone) input')]
      .map(i => i.value);
    recipients = JSON.stringify(ids);
  }

  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const { error } = await sb.from('reminders').insert({
    title,
    description: document.getElementById('r-desc').value.trim(),
    due_date: date,
    category,
    notify_time: notifyTime,
    alerts,
    recipients,
    auto_delete: document.getElementById('autodel-toggle').classList.contains('active'),
    sent_alerts: []
  });

  btn.disabled = false; btn.textContent = 'Save reminder';
  if (error) return showToast('Error saving — check Supabase connection', 'error');

  clearForm();
  showToast('Reminder saved!', 'success');
  switchTab('reminders');
}

function toggleCustomCategory(val) {
  const row = document.getElementById('custom-category-row');
  if (row) row.style.display = val === 'custom' ? 'block' : 'none';
}

function clearForm() {
  ['r-title','r-desc','r-date','r-custom-category'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  const cat = document.getElementById('r-category');
  if (cat) cat.value = 'bill';
  const customRow = document.getElementById('custom-category-row');
  if (customRow) customRow.style.display = 'none';
  const timeEl = document.getElementById('r-notify-time');
  if (timeEl) timeEl.value = '08:00';
  document.querySelectorAll('#alert-options .alert-chip').forEach(c => {
    const v = c.querySelector('input').value;
    const def = ['3','1','0'].includes(v);
    c.classList.toggle('checked', def);
    c.querySelector('input').checked = def;
  });
  const tog = document.getElementById('autodel-toggle');
  if (tog) tog.classList.remove('active');
}

// ─── Add member ────────────────────────────────────────────
async function addMember() {
  const name  = document.getElementById('m-name').value.trim();
  const email = document.getElementById('m-email').value.trim();
  if (!name)  return showToast('Please enter a name', 'error');
  if (!email || !email.includes('@')) return showToast('Please enter a valid email', 'error');

  const btn = document.getElementById('member-btn');
  btn.disabled = true; btn.textContent = 'Adding…';

  const { error } = await sb.from('members').insert({ name, email });
  btn.disabled = false; btn.textContent = 'Add member';
  if (error) return showToast('Error adding member', 'error');

  document.getElementById('m-name').value = '';
  document.getElementById('m-email').value = '';
  showToast(`${name} added!`, 'success');
}

async function deleteMember(id) {
  const m = members.find(x => x.id === id);
  if (!confirm(`Remove ${m?.name || 'this member'}?`)) return;
  const { error } = await sb.from('members').delete().eq('id', id);
  if (error) showToast('Error removing member', 'error');
}

async function deleteReminder(id) {
  if (!confirm('Delete this reminder?')) return;
  const { error } = await sb.from('reminders').delete().eq('id', id);
  if (error) showToast('Error deleting reminder', 'error');
}

    try { currentIds = JSON.parse(r.recipients); } catch { currentIds = []; }

  container.innerHTML = `
    <label class="recipient-chip ${isEveryone ? 'checked' : ''}" id="edit-chip-everyone" onclick="toggleEditEveryone(this, event)">
      <input type="checkbox" value="everyone" ${isEveryone ? 'checked' : ''}> Everyone

  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editId = null;
}

async function saveEdit() {
  const title = document.getElementById('edit-title').value.trim();
  const date  = document.getElementById('edit-date').value;
  if (!title || !date) return showToast('Title and date required', 'error');

  // Get recipients from edit modal
  const evChip = document.getElementById('edit-chip-everyone');
  let recipients;
  if (evChip && evChip.classList.contains('checked')) {
    recipients = 'everyone';
  } else {
    const ids = [...document.querySelectorAll('#edit-recipient-options .recipient-chip.checked:not(#edit-chip-everyone) input')]
      .map(i => i.value);
    recipients = ids.length ? JSON.stringify(ids) : 'everyone';
  }

  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  // Get current sent_alerts so we don't reset them unless date changed
  const current = reminders.find(r => r.id === editId);
  const dateChanged = current && current.due_date !== date;

  const { error } = await sb.from('reminders').update({
    title,
    description:  document.getElementById('edit-desc').value.trim(),
    due_date:     date,
    notify_time:  document.getElementById('edit-notify-time').value,
    recipients,
    auto_delete:  document.getElementById('edit-autodel-toggle').classList.contains('active'),
    sent_alerts:  dateChanged ? [] : (current?.sent_alerts || [])
  }).eq('id', editId);

  btn.disabled = false; btn.textContent = 'Save changes';
  if (error) return showToast('Error updating', 'error');

  // Reload data to make sure UI reflects the saved values
  const { data } = await sb.from('reminders').select('*').order('due_date');
  if (data) { reminders = data; renderReminders(); }

  closeModal();
  showToast('Reminder updated!', 'success');
}

// ─── Email (Mailjet) ───────────────────────────────────────
async function sendEmail(toEmail, toName, subject, html) {
  try {
    const res = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: toEmail, toName, subject, html })
    });
    const data = await res.json();
    return data.success === true;
  } catch { return false; }
}

function buildEmailHtml(r, daysLeft) {
  const urgency = daysLeft === 0 ? 'Today!' : daysLeft === 1 ? 'Tomorrow' : `In ${daysLeft} days`;
  const color   = daysLeft === 0 ? '#C2410C' : daysLeft <= 3 ? '#EA580C' : '#15803D';
  return `<div style="font-family:'DM Sans',Arial,sans-serif;max-width:480px;margin:0 auto;background:#FFFEF9;border:1px solid #E7E2DA;border-radius:12px;overflow:hidden">
    <div style="background:#1C1917;padding:20px 28px"><span style="font-family:Georgia,serif;font-size:18px;color:#FAF7F2">family <em style="color:#EA580C">reminders</em></span></div>
    <div style="padding:28px">
      <div style="background:${color}18;border-left:3px solid ${color};border-radius:4px;padding:10px 14px;margin-bottom:20px"><span style="color:${color};font-weight:600;font-size:15px">${urgency}</span></div>
      <h2 style="font-family:Georgia,serif;font-size:22px;color:#1C1917;margin:0 0 8px">${esc(r.title)}</h2>
      ${r.description ? `<p style="color:#57534E;font-size:14px;line-height:1.6;margin:0 0 16px">${esc(r.description)}</p>` : ''}
      <div style="background:#FAF7F2;border-radius:8px;padding:12px 16px;font-size:14px;color:#57534E"><strong style="color:#1C1917">Due date:</strong> ${new Date(r.due_date).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <div style="padding:16px 28px;border-top:1px solid #E7E2DA;font-size:12px;color:#A8A29E;text-align:center">Sent by Family Reminders</div>
  </div>`;
}

async function checkAndSendDueReminders() {
  if (!localStorage.getItem('mj_from')) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const toDelete = [];

  for (const r of reminders) {
    const due = new Date(r.due_date); due.setHours(0,0,0,0);
    const daysLeft = Math.round((due - today) / 86400000);

    for (const offset of (r.alerts || [])) {
      const alertKey = `${r.id}_${offset}`;
      if ((r.sent_alerts || []).includes(alertKey)) continue;
      if (daysLeft !== offset) continue;

      let targets = r.recipients === 'everyone' ? members : (() => {
        try { const ids = JSON.parse(r.recipients); return members.filter(m => ids.includes(m.id)); } catch { return []; }
      })();

      const subj = daysLeft === 0
        ? `Reminder: ${r.title} is due today`
        : `Reminder: ${r.title} — ${daysLeft} day${daysLeft>1?'s':''} left`;

      for (const m of targets) await sendEmail(m.email, m.name, subj, buildEmailHtml(r, daysLeft));

      const newSentAlerts = [...(r.sent_alerts || []), alertKey];
      await sb.from('reminders').update({ sent_alerts: newSentAlerts }).eq('id', r.id);
      r.sent_alerts = newSentAlerts;
    }

    if (r.auto_delete) {
      const allSent = (r.alerts||[]).length > 0 &&
        (r.alerts||[]).every(o => (r.sent_alerts||[]).includes(`${r.id}_${o}`));
      if (allSent) toDelete.push(r.id);
    }
  }

  if (toDelete.length) {
    for (const id of toDelete) await sb.from('reminders').delete().eq('id', id);
    showToast(`${toDelete.length} completed reminder${toDelete.length>1?'s':''} auto-deleted`);
  }
}

async function sendTestEmail() {
  const from = localStorage.getItem('mj_from');
  if (!from) return showToast('Enter your sender email in Settings first', 'error');
  showToast('Sending test email…');
  const ok = await sendEmail(from, localStorage.getItem('mj_name')||'You', 'Test — Family Reminders is working!',
    buildEmailHtml({ title: 'Test reminder', description: 'Your email setup is working correctly.', due_date: new Date().toISOString().split('T')[0] }, 1));
  showToast(ok ? 'Test email sent! Check your inbox.' : 'Failed — check Vercel environment variables', ok ? 'success' : 'error');
}

// ─── Helpers ───────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3200);
}
